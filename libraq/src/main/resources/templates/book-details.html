<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1><a href="/home" class="logo-link">LibraQ</a></h1>
         <button class="login-btn" onclick="document.location.href='/login'">Login</button>
    </header>

    <main class="book-details-page">
        <div class="search-bar-container">
            <form th:action="@{/home}" method="get" class="search-bar">
                <input type="text" name="query" placeholder="Search by title or author..." th:value="${query}" />
                <button type="submit">Search</button>
            </form>
        </div>

        <section class="book-details">
            <h2 th:text="${book.title}"></h2>
            <p>Author: <span th:text="${book.author}"></span></p>
            <p>Genre: <span th:text="${book.genre.displayName}"></span></p>
            <p>Status:
                <span th:if="${book.available}" style="color: green;">Available</span>
                <span th:if="${!book.available}" style="color: red;">Unavailable</span>
            </p>

            <!-- Checkout section - different messages based on user status -->
            <div th:if="${!book.available}">
                <p style="color: red;">This book is currently unavailable.</p>
            </div>
            
            <div th:if="${book.available}">
                <!-- RENTER: Show checkout button -->
                <div sec:authorize="hasRole('RENTER')">
                    <form th:action="@{|/books/${book.getISBN()}/checkout|}" method="post">
                        <button class="checkout-btn" type="submit">Check Out</button>
                    </form>
                </div>
                
                <!-- Anonymous users: Show login prompt -->
                <div sec:authorize="!isAuthenticated()">
                    <p>Please <a th:href="@{/login}">login as a Renter</a> to checkout this book.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 LibraQ Library System</p>
    </footer>
</body>
</html>
