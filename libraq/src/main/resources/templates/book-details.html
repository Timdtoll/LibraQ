<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1><a th:href="@{/home}" class="logo-link">LibraQ</a></h1>

        <div class="header-right">
            <div class="header-status">

                <div sec:authorize="isAuthenticated()">
                    <span>Signed in as </span>
                    <strong><span sec:authentication="name">User</span></strong>
                </div>

                <!-- When user is NOT logged in -->
                <div sec:authorize="isAnonymous()">
                    <span>You are not signed in.</span>
                </div>

            </div>


            <button class="login-btn" type="button"
                    onclick="document.location.href='/userdetails'"
                    sec:authorize="isAuthenticated()">
                Profile
            </button>

            <button class="login-btn" type="button"
                    onclick="document.location.href='/login'"
                    sec:authorize="isAnonymous()">
                Login
            </button>

            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button type="submit" class="login-btn">Logout</button>
            </form>
        </div>
     </header>

    <main class="book-details-page">
        <div class="search-bar-container">
            <form th:action="@{/home}" method="get" class="search-bar">
                <input type="text" name="query" placeholder="Search by title or author..." th:value="${query}" />
                <button type="submit">Search</button>
            </form>
        </div>

        <section class="book-details">
            <h2 th:text="${book.title}"></h2>
            <p>Author: <span th:text="${book.author}"></span></p>
            <p>Genre: <span th:text="${book.genre.displayName}"></span></p>
            <p>Status:
                <span th:if="${book.available}" style="color: green;">Available</span>
                <span th:if="${!book.available}" style="color: red;">Unavailable</span>
            </p>
            <p><span th:if="${!book.available and activeCheckout != null}" >
                    Expected by <span th:text="${activeCheckout.dueDate}"></span>
                </span>
            </p>
            
            <div th:if="${book.available}">
                <!-- RENTER: Show checkout button -->
                <div sec:authorize="hasRole('RENTER')">
                    <button class="checkout-btn"
                            th:if="${book.available}"
                            th:attr="data-title=${book.title}, data-author=${book.author}, data-isbn=${book.ISBN}"
                            onclick="openConfirmPopup(this)">
                        Check Out
                    </button>
                </div>
                
                <!-- Anonymous users: Show login prompt -->
                <div sec:authorize="!isAuthenticated()">
                    <p>Please <a th:href="@{/login}">login as a Renter</a> to checkout this book.</p>
                </div>
            </div>
            
            <!-- LIBRARIAN: Show check-in button when book is unavailable -->
<div th:if="${!book.available}" sec:authorize="hasRole('LIBRARIAN')">
    <form th:action="@{'/books/' + ${book.ISBN} + '/checkin'}" method="post">
        <button type="submit" class="checkout-btn">
            Check In
        </button>
    </form>
</div>
             
             
        </section>
    </main>

    <!-- Confirmation Popup (before checkout is submitted) -->
    <div id="confirmPopup" class="popup-overlay" style="display:none;">
        <div class="popup-box">
            <button class="popup-close" onclick="closePopup('confirmPopup')">×</button>
            <h3>Confirm Checkout</h3>
            <p id="confirmMessage"></p>
            <div class="popup-actions">
                <form id="checkoutForm" method="post">
                    <button type="submit" class="popup-btn">Confirm</button>
                </form>
                <button type="button" class="popup-btn cancel" onclick="closePopup('confirmPopup')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Success / Error Popup (after book has been attempted to be checked out) -->
	<div id="resultPopup" class="popup-overlay"
     th:if="${checkoutSuccess != null or checkoutError != null or checkinSuccess != null or checkinError != null}"
     style="display:flex;">
    <div class="popup-box">
        <button class="popup-close" onclick="closePopup('resultPopup')">×</button>

        <!-- Heading -->
        <h3 th:if="${checkoutSuccess != null or checkinSuccess != null}" class="success-title">Success</h3>
        <h3 th:if="${checkoutError != null or checkinError != null}" class="error-title">Error</h3>

        <!-- Messages -->
        <p th:if="${checkoutSuccess != null}" th:text="${checkoutSuccess}"></p>
        <p th:if="${checkoutError != null}" th:text="${checkoutError}"></p>
        <p th:if="${checkinSuccess != null}" th:text="${checkinSuccess}"></p>
        <p th:if="${checkinError != null}" th:text="${checkinError}"></p>

        <div class="popup-actions">
            <button type="button" class="popup-btn" onclick="window.location.href='/home'">Take Me Home</button>
        </div>
    </div>
</div>




    <footer>
        <p>&copy; 2025 LibraQ Library System</p>
    </footer>

    <script>
        function openConfirmPopup(button) {
            const title = button.getAttribute('data-title');
            const author = button.getAttribute('data-author');
            const isbn = button.getAttribute('data-isbn');

            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 14);
            const formattedDate = dueDate.toLocaleDateString();

            const msg = `Do you want to check out "${title}" by ${author}? \nIt will be due on ${formattedDate}.`;
            document.getElementById('confirmMessage').innerText = msg;

            const form = document.getElementById('checkoutForm');
            form.action = `/books/${isbn}/checkout`;

            document.getElementById('confirmPopup').style.display = 'flex';
        }

        function closePopup(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>

</body>
</html>
