<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <!-- Clickable LibraQ logo that sends you home -->
        <h1><a th:href="@{/home}" class="logo-link">LibraQ</a></h1>

        <div class="header-right">
            <div class="header-status">

                <!-- When user IS logged in -->
                <div sec:authorize="isAuthenticated()">
                    <span>Signed in as </span>
                    <strong><span sec:authentication="name">User</span></strong>
                </div>

                <!-- When user is NOT logged in -->
                <div sec:authorize="isAnonymous()">
                    <span>You are not signed in.</span>
                </div>

            </div>

            <!-- Navigation buttons -->

            <!-- Manage Requests button: only for librarians -->
            <button class="login-btn" type="button"
                    onclick="document.location.href='/book-requests/manage'"
                    sec:authorize="hasRole('LIBRARIAN')"
                    style="margin-right: 10px;">
                Manage Requests
            </button>

            <!-- Profile button: only when logged in, redirects to user details page if renter, manage if librarian -->
            <div sec:authorize="hasRole('RENTER')">
                <button class="login-btn" type="button"
                    onclick="document.location.href='/userdetails'"
                    sec:authorize="isAuthenticated()">
                    Profile
                </button>
            </div>
            
            <div sec:authorize="hasRole('LIBRARIAN')"> 
                <button class="login-btn" type="button"
                    onclick="document.location.href='/librarianpage'"
                    sec:authorize="isAuthenticated()">
                    Console
                </button>
            </div>
            
            <!-- Login button: only when NOT logged in -->
            <button class="login-btn" type="button"
                    onclick="document.location.href='/login'"
                    sec:authorize="isAnonymous()">
                Login
            </button>

            <!-- Logout button only when logged in -->
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button type="submit" class="login-btn">Logout</button>
            </form>
        </div>
    </header>

    <div class="content-container">
        <!-- Sidebar for Genre Filters -->
        <aside class="genre-sidebar">
            <h3>Filter by Genre</h3>
            <form th:action="@{/home}" method="get">
                <div class="checkbox-group">
                    <label th:each="genre : ${genres}">
                        <input type="checkbox" name="genres"
                               th:value="${genre}"
                               th:checked="${selectedGenres != null and selectedGenres.contains(genre)}"/>
                        <span th:text="${genre.displayName}">Genre</span>
                    </label>
                </div>
                <button type="submit" class="filter-btn">Apply Filter</button>
            </form>
        </aside>

        <!-- Main Content -->
        <main>
            <!-- Search Bar for searching by author or by title -->
            <div class="search-bar-container">
                <form th:action="@{/home}" method="get" class="search-bar">
                    <input type="text" name="query" placeholder="Search by title or author..."
                           th:value="${query}" />
                    <button type="submit">Search</button>
                </form>
            </div>

            <!-- Book List/Search Results -->
            <section>
                <h2>Available Books</h2>

                <div th:if="${#lists.isEmpty(books)}" class="no-books">
                    <p>No books found.</p>
                </div>

                <div class="book-list" th:if="${!#lists.isEmpty(books)}">
                    <div class="book-card" th:each="book : ${books}">
                        <a th:href="@{/books/{isbn}(isbn=${book.getISBN()})}" class="book-link">
                            <h3 th:text="${book.title}">Book Title</h3>
                            <p><strong>Author:</strong> <span th:text="${book.author}">Author Name</span></p>
                            <p><strong>Genre:</strong> <span th:text="${book.genre.displayName}">Genre</span></p>
                            <p th:if="${book.isAvailable()}" style="color: green;">Available</p>
                            <p th:if="${!book.isAvailable()}" style="color: red;">Unavailable</p>
                        </a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 LibraQ Library System</p>
    </footer>
</body>
</html>
