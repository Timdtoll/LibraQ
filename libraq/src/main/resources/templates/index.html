<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1>LibraQ</h1>
        <form th:action="@{/home}" method="get" class="search-bar">
            <input type="text" name="query" placeholder="Search by title or author..." 
                   th:value="${query}" />
            <button type="submit">Search</button>
        </form>
    </header>

    <section>
        <h2>Available Books</h2>

        <div th:if="${#lists.isEmpty(books)}" class="no-books">
            <p>No books found.</p>
        </div>

        <div class="book-list" th:if="${!#lists.isEmpty(books)}">
            <div class="book-card" th:each="book : ${books}">
                <h3 th:text="${book.title}">Book Title</h3>
                <p><strong>Author:</strong> <span th:text="${book.author}">Author Name</span></p>
                <p><strong>Genre:</strong> <span th:text="${book.genre}">Genre</span></p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 LibraQ Library System</p>
    </footer>
</body>
</html>
