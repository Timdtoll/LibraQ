<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
<header>
    <h1>LibraQ</h1>
</header>

<div class="login-container">
    <section class="login-card">
        <h2>Login to your account</h2>

        <form th:action="@{/login}" method="post" class="login-form">
            
            <div th:if="${param.error}" class="error-message">
                Invalid email or password. Please try again.
            </div>
            
            <div th:if="${param.logout}" class="success-message">
                You have been successfully logged out.
            </div>

            <div class="form-group">
                <label for="username">Email Address</label>
                <input id="username" name="username" type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <p class="register-link">
                Don't have an account? <a th:href="@{/register}">Register here</a>
            </p>

        </form>
    </section>
</div>

<footer>
    <p>&copy; 2025 LibraQ Library System</p>
</footer>
</body>
</html>
