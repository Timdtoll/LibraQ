<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
<header>
    <h1>LibraQ</h1>
</header>

<div class="content-container registration-container">

    <main>
        <section class="registration-card">
            <h2>Create Your Account</h2>

            <form th:action="@{/register}" method="post" class="registration-form">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input id="name" name="name" type="text" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input id="email" name="email" type="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="register-btn">Register</button>

                <p class="login-link">
                    Already have an account? <a th:href="@{/login}">Login here</a>
                </p>

            </form>
        </section>
    </main>
</div>

<footer>
    <p>&copy; 2025 LibraQ Library System</p>
</footer>

</body>
</html>
