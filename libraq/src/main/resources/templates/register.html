<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
<header>
    <h1><a href="/home" class="logo-link">LibraQ</a></h1>
</header>

<div class="registration-container">
    <section class="registration-card">
        <h2>Create Your Account</h2>

        <form th:action="@{/register}" th:object="${dto}" method="post" class="registration-form">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" th:field="*{name}" type="text" placeholder="Enter your full name" required>
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" th:field="*{email}" type="email" placeholder="Enter your email" required>
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" th:field="*{password}" type="password" placeholder="Create a password" required>
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" th:field="*{confirmPassword}" type="password" placeholder="Re-enter password" required>
                <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error-message"></div>
            </div>

            <button type="submit" class="register-btn">Register</button>

            <p class="login-link">
                Already have an account? <a th:href="@{/login}">Login here</a>
            </p>

        </form>
    </section>
</div>

<footer>
    <p>&copy; 2025 LibraQ Library System</p>
</footer>
</body>
</html>
