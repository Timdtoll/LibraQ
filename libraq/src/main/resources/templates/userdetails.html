<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>udetails | LibraQ</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
     <header>
        <h1><a th:href="@{/home}" class="logo-link">LibraQ</a></h1>

        <div class="header-right">
            <div class="header-status">

                <div sec:authorize="isAuthenticated()">
                    <span>Signed in as </span>
                    <strong><span sec:authentication="name">User</span></strong>
                </div>

                <!-- When user is NOT logged in -->
                <div sec:authorize="isAnonymous()">
                    <span>You are not signed in.</span>
                </div>

            </div>

            <!-- Profile button: only when logged in, redirects to user details page if renter, console if librarian-->
            <div sec:authorize="hasRole('RENTER')"> 
                <button class="login-btn" type="button"
                    onclick="document.location.href='/userdetails'"
                    sec:authorize="isAuthenticated()">
                    Profile
                </button>
            </div>
            <div sec:authorize="hasRole('LIBRARIAN')"> 
                <button class="login-btn" type="button"
                    onclick="document.location.href='/librarianpage'"
                    sec:authorize="isAuthenticated()">
                    Console
                </button>
            </div>

            <button class="login-btn" type="button"
                    onclick="document.location.href='/login'"
                    sec:authorize="isAnonymous()">
                Login
            </button>

            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                <button type="submit" class="login-btn">Logout</button>
            </form>
        </div>
     </header>

    <!-- Main Content -->
     
     <div class="full-width-container">
        <!-- Welcome User -->
        <div class="welcome-message">Welcome <span th:text="${user.name}"></span></div>
        
        <!-- Action Buttons -->
        <div class="action-buttons">
            <!-- Librarian Actions -->
            <button class="btn-primary" type="button" 
                    onclick="document.location.href='/book-requests/manage'"
                    sec:authorize="hasRole('LIBRARIAN')">
                Manage Book Requests
            </button>
            
            <!-- Renter Actions -->
            <button class="btn-primary" type="button" 
                    onclick="document.location.href='/book-requests/'"
                    sec:authorize="hasRole('RENTER')">
                Request a Book
            </button>
            <button class="btn-primary" type="button" 
                    onclick="document.location.href='/book-requests/my-requests'"
                    sec:authorize="hasRole('RENTER')">
                My Requests
            </button>
        </div>
        
        <!-- Checked out books-->
        <main>
            <div sec:authorize="hasRole('RENTER')">
                <section>
                    <h2>Checked Out books:</h2>
                    <div th:if="${#lists.isEmpty(checkouts)}" class="no-books">
                        <p>No books checked out.</p>
                    </div>
                    <div class="book-list" th:if="${!#lists.isEmpty(checkouts)}">
                        <div class="book-card" th:each="checkout : ${checkouts}">
                            <h3 th:text="${checkout.book.title}">Book Title</h3>
                            <p><strong>Author:</strong> <span th:text="${checkout.book.author}">Author Name</span></p>
                            <p><strong>Genre:</strong> <span th:text="${checkout.book.genre.displayName}">Genre</span></p>
                            <p><strong>Checked Out:</strong> <span th:text="${checkout.checkoutDate}">Checkout Date</span></p>
                            <p><strong>Due:</strong> <span th:text="${checkout.dueDate}">Due Date</span></p>

                           <form th:action="@{/extend/{id}(id=${checkout.id})}" method="post" th:if="${checkout.returnDate == null}">
                                <button type="submit" class="checkout-btn">Extend Due Date</button>
                            </form>

                            <!-- Currently does not work due to date comparison issues
                            <p th:if="${#temporals.isBefore(#temporals.createNow(), checkout.dueDate)}" style="color: green;">Due Date</p>
                            <p th:if="${#temporals.isAfter(#temporals.createNow(), checkout.dueDate)}" style="color: red;">Due Date</p>
                            -->
                    </div>
                </div>
            </section>

            <!-- Popup for extension results -->
            <div id="extendPopup" class="popup-overlay"
                th:if="${extendSuccess != null or extendError != null}" style="display:flex;">
                <div class="popup-box">
                    <button class="popup-close" onclick="closePopup('extendPopup')">×</button>

                    <h3 th:if="${extendSuccess != null}" class="success-title">Success</h3>
                    <h3 th:if="${extendError != null}" class="error-title">Error</h3>

                    <p th:if="${extendSuccess != null}" th:text="${extendSuccess}"></p>
                    <p th:if="${extendError != null}" th:text="${extendError}"></p>

                    <div class="popup-actions">
                        <button class="popup-btn" onclick="window.location.href='/userdetails'">OK</button>
                    </div>
                </div>
            </div>

        </main>
     </div>
     

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 LibraQ Library System</p>
    </footer>

    <script>
            function closePopup(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
